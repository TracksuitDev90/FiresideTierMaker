<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0d1a" />
  <meta name="description" content="Create and share custom tier lists. Drag and drop to rank your favorites, then save as PNG." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <!-- Open Graph -->
  <meta property="og:title" content="FIRESIDE Tier Maker" />
  <meta property="og:description" content="Create and share custom tier lists. Drag and drop to rank your favorites." />
  <meta property="og:type" content="website" />
  <title>FIRESIDE tier maker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="quadrant.css" />
  <link rel="stylesheet" href="image-search.css" />
  <link rel="stylesheet" href="battles.css" />
</head>
<body>
  <div class="wrap">
    <!-- Brand -->
    <header class="header">
      <div class="brand-wrap">
        <div class="brand">FSTM</div>
        <div class="brand-sub">fireside tier maker</div>
      </div>
    </header>

    <!-- Create custom items -->
    <section class="panel creator-grid" aria-labelledby="createTitle">
      <h2 id="createTitle" class="sr">Create custom items</h2>

      <input id="imageInput" class="sr" type="file" accept="image/*" multiple />
      <div class="action-bar">
        <div class="img-btn-wrap">
          <button id="addImageBtn" class="action-icon" type="button" title="Upload image" aria-label="Upload image">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 12.5001L3.75159 10.9675C4.66286 10.1702 6.03628 10.2159 6.89249 11.0721L11.1822 15.3618C11.8694 16.0491 12.9512 16.1428 13.7464 15.5839L14.0446 15.3744C15.1888 14.5702 16.7369 14.6634 17.7765 15.599L21 18.5001"/><path d="M15 5.5H18.5M18.5 5.5H22M18.5 5.5V9M18.5 5.5V2"/><path d="M22 12C22 16.714 22 19.0711 20.5355 20.5355C19.0711 22 16.714 22 12 22C7.28595 22 4.92893 22 3.46447 20.5355C2 19.0711 2 16.714 2 12C2 10.8717 2 9.87835 2.02008 9M12 2C7.28595 2 4.92893 2 3.46447 3.46447C3.03965 3.88929 2.73806 4.38921 2.52396 5"/></svg>
          </button>
          <div id="imgDropdown" class="img-dropdown hidden">
            <button id="uploadBtn" class="img-option" type="button">
              <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z" fill="currentColor"/></svg>
              <span>Upload from device</span>
            </button>
            <button id="linkOptBtn" class="img-option" type="button">
              <svg viewBox="0 0 24 24" width="18" height="18"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z" fill="currentColor"/></svg>
              <span>Paste image URL</span>
            </button>
            <button id="searchImgBtn" class="img-option" type="button">
              <svg viewBox="0 0 24 24" width="18" height="18"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
              <span>Search for images</span>
            </button>
            <div id="urlInputRow" class="url-input-row hidden">
              <label class="sr" for="imageUrlInput">Image URL</label>
              <input id="imageUrlInput" class="input url-inline" type="url" placeholder="https://..." autocomplete="off" />
              <button id="addUrlBtn" class="btn small url-go" type="button">Go</button>
            </div>
          </div>
        </div>
        <div class="action-divider"></div>
        <label class="sr" for="nameInput">Token name</label>
        <input id="nameInput" class="action-input" type="text" placeholder="Type a name and hit the + ..." autocomplete="off" maxlength="24" />
        <input id="nameColor" class="action-color" type="color" title="Token color" />
        <button id="addNameBtn" class="action-icon" type="button" title="Add token" aria-label="Add token">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

      <!-- Pull-down help drawer -->
      <div class="help-drawer" id="helpDrawer">
        <div class="help-handle" id="helpHandle">
          <span class="help-handle-pill"></span>
          <span class="help-handle-label">HELP</span>
        </div>
        <div class="help-tray" id="helpTray">
          <div class="help-tips" id="helpTips"></div>
        </div>
      </div>
    </section>

    <!-- Tier board -->
    <section class="panel" id="boardPanel" aria-label="Tier board">
      <div class="board-title-wrap">
        <span class="title-pen" aria-hidden="true">
          <img class="pen-icon" src="icons/pen-2-svgrepo-com.svg" alt="" width="18" height="18" />
        </span>
        <h2 class="board-title" contenteditable="true" spellcheck="false"></h2>
      </div>
      <!-- Swipe prompt cards -->
      <div class="prompt-stack-wrap" id="promptStack">
        <div class="prompt-cards" id="promptCards"></div>
      </div>

      <div id="tierBoard" aria-live="off"></div>
    </section>

    <!-- Controls (moved below the board) -->
    <section class="panel" aria-label="Board Controls">
      <div class="controls">
        <button id="newBracketBtn" class="btn" type="button">
          <span class="ico">
            <img class="btn-icon" src="icons/tournament-bracket-svgrepo-com.svg" alt="" width="22" height="22" />
          </span>
          <span>New Matchup</span>
        </button>

        <button id="addTierBtn" class="btn" type="button">
          <span class="ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M22 12C22 12 21.0071 12.8907 19.0212 13.6851L16.2127 14.8085C14.2268 15.6028 13.2339 16 12 16C10.7661 16 9.77318 15.6028 7.7873 14.8085L4.97883 13.6851C2.99294 12.8907 2 12 2 12"/><path d="M2 16C2 16 2.99294 16.8907 4.97883 17.6851L7.7873 18.8085C9.77318 19.6028 10.7661 20 12 20C12.9539 20 13.7639 19.7626 15 19.2878M19.0212 17.6851C21.0071 16.8907 22 16 22 16"/><path d="M4.97883 6.31492C2.99294 7.10927 2 7.50645 2 8C2 8.49355 2.99294 8.89073 4.97883 9.68508L7.7873 10.8085C9.77318 11.6028 10.7661 12 12 12C13.2339 12 14.2268 11.6028 16.2127 10.8085L19.0212 9.68508C21.0071 8.89073 22 8.49355 22 8C22 7.50645 21.0071 7.10927 19.0212 6.31492L16.2127 5.19153C14.2268 4.39718 13.2339 4 12 4C11.0461 4 10.2361 4.2374 9 4.71221"/></svg>
          </span>
          <span>Add Tier</span>
        </button>

        <button id="undoBtn" class="btn" type="button" disabled>
          <span class="ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7H15C16.8692 7 17.8039 7 18.5 7.40193C18.9561 7.66523 19.3348 8.04394 19.5981 8.49999C20 9.19615 20 10.1308 20 12C20 13.8692 20 14.8038 19.5981 15.5C19.3348 15.9561 18.9561 16.3348 18.5 16.5981C17.8039 17 16.8692 17 15 17H8.00001M4 7L7 4M4 7L7 10"/></svg>
          </span>
          <span>Undo</span>
        </button>

        <button id="trashClear" class="btn" type="button">
          <span class="ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M20.5001 6H3.5"/><path d="M9.5 11L10 16"/><path d="M14.5 11L14 16"/><path d="M6.5 6C6.55588 6 6.58382 6 6.60915 5.99936C7.43259 5.97849 8.15902 5.45491 8.43922 4.68032C8.44784 4.65649 8.45667 4.62999 8.47434 4.57697L8.57143 4.28571C8.65431 4.03708 8.69575 3.91276 8.75071 3.8072C8.97001 3.38607 9.37574 3.09364 9.84461 3.01877C9.96213 3 10.0932 3 10.3553 3H13.6447C13.9068 3 14.0379 3 14.1554 3.01877C14.6243 3.09364 15.03 3.38607 15.2493 3.8072C15.3043 3.91276 15.3457 4.03708 15.4286 4.28571L15.5257 4.57697C15.5433 4.62992 15.5522 4.65651 15.5608 4.68032C15.841 5.45491 16.5674 5.97849 17.3909 5.99936C17.4162 6 17.4441 6 17.5 6"/><path d="M18.3735 15.3991C18.1965 18.054 18.108 19.3815 17.243 20.1907C16.378 21 15.0476 21 12.3868 21H11.6134C8.9526 21 7.6222 21 6.75719 20.1907C5.89218 19.3815 5.80368 18.054 5.62669 15.3991L5.16675 8.5M18.8334 8.5L18.6334 11.5"/></svg>
          </span>
          <span>Clear Board</span>
        </button>

        <button id="themeToggle" class="btn" type="button" aria-pressed="false">
          <span class="ico theme-icon">
            <img class="btn-icon moon-icon" src="icons/moon.png" alt="" width="22" height="22" />
          </span>
          <span class="theme-text">Light</span>
        </button>

        <button id="saveBtn" class="btn" type="button">
          <span class="ico">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8L12 16M12 16L15 13M12 16L9 13"/><path d="M7 3.33782C8.47087 2.48697 10.1786 2 12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 10.1786 2.48697 8.47087 3.33782 7"/></svg>
          </span>
          <span>Save Tierlist</span>
        </button>
      </div>
    </section>

    <!-- Items tray -->
    <section class="panel">
      <h2 class="section-title">Image Storage <span id="trayCount" class="tray-count">0</span></h2>
      <div class="tray-well">
        <div id="tray" role="list"></div>
      </div>
    </section>

    <!-- Mobile radial picker -->
    <div id="radialPicker" class="radial hidden" aria-hidden="true">
      <div class="radial-options"></div>
      <div class="radial-highlight" hidden></div>
      <button class="radial-close" type="button" aria-label="Close">
        <svg viewBox="0 0 24 24"><path d="M18.3 5.71L12 12.01l-6.29-6.3-1.41 1.42L10.59 13.4l-6.3 6.3 1.42 1.41 6.29-6.29 6.29 6.29 1.41-1.41-6.3-6.3 6.3-6.29-1.41-1.42z"/></svg>
      </button>
    </div>

    <!-- A11y live region -->
    <div id="live" class="sr" aria-live="polite"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js" crossorigin="anonymous"></script>
  <script src="script.js"></script>
  <script src="image-search.js"></script>
  <script src="battles.js"></script>
  <script src="quadrant.js"></script>
</body>
</html>
