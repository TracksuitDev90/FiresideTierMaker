<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bb-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
  </defs>
  <!-- Bull head silhouette -->
  <g transform="translate(100,105)">
    <!-- Left horn -->
    <path d="M-25,-30 Q-55,-75 -70,-65 Q-60,-50 -35,-25" fill="#1a1a1a" stroke="#c0392b" stroke-width="2"/>
    <!-- Right horn -->
    <path d="M25,-30 Q55,-75 70,-65 Q60,-50 35,-25" fill="#1a1a1a" stroke="#c0392b" stroke-width="2"/>
    <!-- Head shape -->
    <ellipse cx="0" cy="0" rx="38" ry="42" fill="url(#bb-grad)" stroke="#c0392b" stroke-width="2.5"/>
    <!-- Ears -->
    <ellipse cx="-32" cy="-20" rx="12" ry="8" fill="#1a1a1a" stroke="#c0392b" stroke-width="1.5" transform="rotate(-20,-32,-20)"/>
    <ellipse cx="32" cy="-20" rx="12" ry="8" fill="#1a1a1a" stroke="#c0392b" stroke-width="1.5" transform="rotate(20,32,-20)"/>
    <!-- Eyes -->
    <ellipse cx="-14" cy="-8" rx="6" ry="5" fill="#c0392b"/>
    <ellipse cx="14" cy="-8" rx="6" ry="5" fill="#c0392b"/>
    <circle cx="-14" cy="-8" r="2.5" fill="#FFD700"/>
    <circle cx="14" cy="-8" r="2.5" fill="#FFD700"/>
    <!-- Nostrils -->
    <ellipse cx="-8" cy="18" rx="5" ry="6" fill="#0d0d0d" stroke="#c0392b" stroke-width="1"/>
    <ellipse cx="8" cy="18" rx="5" ry="6" fill="#0d0d0d" stroke="#c0392b" stroke-width="1"/>
    <!-- Nose ring -->
    <circle cx="0" cy="25" r="8" fill="none" stroke="#FFD700" stroke-width="2.5"/>
    <!-- Snout line -->
    <path d="M-12,10 Q0,14 12,10" fill="none" stroke="#333" stroke-width="1.5"/>
  </g>
  <!-- Five-pointed star on forehead -->
  <polygon points="100,55 103,64 112,64 105,70 107,79 100,74 93,79 95,70 88,64 97,64" fill="#c0392b"/>
</svg>