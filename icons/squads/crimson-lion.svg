    <path d="M0,6 Q0,10 -6,12" fill="none" stroke="#8B4513" stroke-width="1.5"/>
    <path d="M0,6 Q0,10 6,12" fill="none" stroke="#8B4513" stroke-width="1.5"/>
    <!-- Chin/jaw -->
    <path d="M-15,20 Q0,30 15,20" fill="none" stroke="#8B4513" stroke-width="1.5"/>
