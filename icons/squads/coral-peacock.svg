<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="cp-eye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="40%" stop-color="#FF1493"/>
      <stop offset="100%" stop-color="#FF7F50"/>
    </radialGradient>
  </defs>
  <g transform="translate(100,110)">
    <!-- Tail fan feathers -->
    <ellipse cx="0" cy="-55" rx="10" ry="30" fill="#FF7F50" stroke="#CD5C5C" stroke-width="1" opacity="0.85"/>
    <ellipse cx="0" cy="-55" rx="10" ry="30" fill="#FF7F50" stroke="#CD5C5C" stroke-width="1" opacity="0.85" transform="rotate(25)"/>
    <ellipse cx="0" cy="-55" rx="10" ry="30" fill="#FF7F50" stroke="#CD5C5C" stroke-width="1" opacity="0.85" transform="rotate(-25)"/>
    <ellipse cx="0" cy="-55" rx="10" ry="30" fill="#FF7F50" stroke="#CD5C5C" stroke-width="1" opacity="0.85" transform="rotate(50)"/>
    <ellipse cx="0" cy="-55" rx="10" ry="30" fill="#FF7F50" stroke="#CD5C5C" stroke-width="1" opacity="0.85" transform="rotate(-50)"/>
    <ellipse cx="0" cy="-55" rx="9" ry="28" fill="#FF6347" stroke="#CD5C5C" stroke-width="1" opacity="0.8" transform="rotate(70)"/>
    <ellipse cx="0" cy="-55" rx="9" ry="28" fill="#FF6347" stroke="#CD5C5C" stroke-width="1" opacity="0.8" transform="rotate(-70)"/>
    <!-- Eye spots on feathers -->
    <circle cx="0" cy="-72" r="6" fill="url(#cp-eye)" opacity="0.9"/>
    <circle cx="22" cy="-68" r="5" fill="url(#cp-eye)" opacity="0.9" transform="rotate(25)"/>
    <circle cx="-22" cy="-68" r="5" fill="url(#cp-eye)" opacity="0.9" transform="rotate(-25)"/>
    <!-- Body -->
    <ellipse cx="0" cy="10" rx="15" ry="22" fill="#FF7F50" stroke="#CD5C5C" stroke-width="1.5"/>
    <!-- Neck -->
    <path d="M-6,-5 Q-4,-18 0,-25 Q4,-18 6,-5" fill="#FF6347" stroke="#CD5C5C" stroke-width="1"/>
    <!-- Head -->
    <circle cx="0" cy="-30" r="10" fill="#FF6347" stroke="#CD5C5C" stroke-width="1.5"/>
    <!-- Crown feathers -->
    <line x1="-3" y1="-38" x2="-5" y2="-50" stroke="#FF1493" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-39" x2="0" y2="-52" stroke="#FF1493" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-38" x2="5" y2="-50" stroke="#FF1493" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-5" cy="-51" r="2" fill="#FF1493"/>
    <circle cx="0" cy="-53" r="2" fill="#FF1493"/>
    <circle cx="5" cy="-51" r="2" fill="#FF1493"/>
    <!-- Eye -->
    <circle cx="-4" cy="-31" r="2.5" fill="#1a1a1a"/>
    <circle cx="4" cy="-31" r="2.5" fill="#1a1a1a"/>
    <!-- Beak -->
    <path d="M0,-26 L3,-22 L0,-23 L-3,-22 Z" fill="#FFD700"/>
    <!-- Feet -->
    <line x1="-5" y1="30" x2="-8" y2="42" stroke="#CD5C5C" stroke-width="2"/>
    <line x1="5" y1="30" x2="8" y2="42" stroke="#CD5C5C" stroke-width="2"/>
  </g>
</svg>