<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#32CD32"/>
      <stop offset="100%" stop-color="#006400"/>
    </linearGradient>
  </defs>
  <g transform="translate(100,100)">
    <!-- Body -->
    <ellipse cx="0" cy="15" rx="12" ry="30" fill="url(#gm-grad)" stroke="#005000" stroke-width="1.5"/>
    <!-- Thorax -->
    <ellipse cx="0" cy="-10" rx="10" ry="12" fill="#2E8B57" stroke="#005000" stroke-width="1.5"/>
    <!-- Head - triangular -->
    <path d="M-14,-28 L0,-50 L14,-28 Q8,-22 0,-20 Q-8,-22 -14,-28 Z" fill="#32CD32" stroke="#005000" stroke-width="1.5"/>
    <!-- Eyes - large compound eyes -->
    <ellipse cx="-10" cy="-35" rx="7" ry="6" fill="#7CFC00" stroke="#005000" stroke-width="1"/>
    <ellipse cx="10" cy="-35" rx="7" ry="6" fill="#7CFC00" stroke="#005000" stroke-width="1"/>
    <circle cx="-10" cy="-35" r="2.5" fill="#004d00"/>
    <circle cx="10" cy="-35" r="2.5" fill="#004d00"/>
    <!-- Antennae -->
    <path d="M-5,-48 Q-15,-70 -20,-75" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <path d="M5,-48 Q15,-70 20,-75" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <!-- Front legs (raptorial - signature mantis arms) -->
    <path d="M-8,-5 L-35,-30 L-50,-15" fill="none" stroke="#228B22" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-50,-15 L-35,-25" fill="none" stroke="#228B22" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M8,-5 L35,-30 L50,-15" fill="none" stroke="#228B22" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M50,-15 L35,-25" fill="none" stroke="#228B22" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Spines on front legs -->
    <line x1="-42" y1="-22" x2="-46" y2="-28" stroke="#005000" stroke-width="1.5"/>
    <line x1="-38" y1="-25" x2="-42" y2="-31" stroke="#005000" stroke-width="1.5"/>
    <line x1="42" y1="-22" x2="46" y2="-28" stroke="#005000" stroke-width="1.5"/>
    <line x1="38" y1="-25" x2="42" y2="-31" stroke="#005000" stroke-width="1.5"/>
    <!-- Middle legs -->
    <path d="M-10,5 Q-30,10 -40,25" fill="none" stroke="#228B22" stroke-width="2" stroke-linecap="round"/>
    <path d="M10,5 Q30,10 40,25" fill="none" stroke="#228B22" stroke-width="2" stroke-linecap="round"/>
    <!-- Rear legs -->
    <path d="M-8,25 Q-25,35 -35,50" fill="none" stroke="#228B22" stroke-width="2" stroke-linecap="round"/>
    <path d="M8,25 Q25,35 35,50" fill="none" stroke="#228B22" stroke-width="2" stroke-linecap="round"/>
    <!-- Wings hint -->
    <path d="M-8,0 Q-25,5 -20,20" fill="#90EE90" opacity="0.3" stroke="#005000" stroke-width="0.5"/>
    <path d="M8,0 Q25,5 20,20" fill="#90EE90" opacity="0.3" stroke="#005000" stroke-width="0.5"/>
  </g>
</svg>