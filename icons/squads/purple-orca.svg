<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="po-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#4B0082"/>
    </linearGradient>
  </defs>
  <g transform="translate(100,100)">
    <!-- Body -->
    <path d="M-45,10 Q-50,-20 -30,-45 Q-10,-60 10,-55 Q35,-48 50,-25 Q58,-5 55,15 Q50,30 35,35 Q15,40 -5,35 Q-30,30 -45,10 Z" fill="url(#po-grad)" stroke="#3a006f" stroke-width="2"/>
    <!-- Belly patch -->
    <path d="M-30,5 Q-25,-15 -10,-25 Q5,-30 20,-25 Q35,-15 40,5 Q35,20 20,25 Q0,28 -15,22 Q-28,15 -30,5 Z" fill="#D8BFD8" stroke="none"/>
    <!-- Dorsal fin -->
    <path d="M5,-50 L-5,-80 L-15,-48" fill="url(#po-grad)" stroke="#3a006f" stroke-width="1.5"/>
    <!-- Tail -->
    <path d="M-42,10 Q-55,5 -70,-10 Q-60,0 -65,15 Q-55,10 -42,12" fill="url(#po-grad)" stroke="#3a006f" stroke-width="1.5"/>
    <!-- Pectoral fin -->
    <path d="M15,20 Q25,35 15,45 Q10,35 15,20" fill="#6A0DAD" stroke="#3a006f" stroke-width="1"/>
    <!-- Eye patch -->
    <ellipse cx="35" cy="-15" rx="12" ry="10" fill="#E6E6FA"/>
    <!-- Eye -->
    <circle cx="37" cy="-15" r="5" fill="#1a1a1a"/>
    <circle cx="38.5" cy="-16" r="1.5" fill="white"/>
    <!-- Mouth line -->
    <path d="M50,-5 Q45,5 35,8" fill="none" stroke="#3a006f" stroke-width="1.5"/>
  </g>
</svg>