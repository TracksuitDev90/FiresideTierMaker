<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="gd-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
  </defs>
  <!-- Outer rays -->
  <g transform="translate(100,100)">
    <polygon points="0,-90 8,-35 -8,-35" fill="#FFD700" transform="rotate(0)"/>
    <polygon points="0,-90 8,-35 -8,-35" fill="#FFD700" transform="rotate(45)"/>
    <polygon points="0,-90 8,-35 -8,-35" fill="#FFD700" transform="rotate(90)"/>
    <polygon points="0,-90 8,-35 -8,-35" fill="#FFD700" transform="rotate(135)"/>
    <polygon points="0,-90 8,-35 -8,-35" fill="#FFD700" transform="rotate(180)"/>
    <polygon points="0,-90 8,-35 -8,-35" fill="#FFD700" transform="rotate(225)"/>
    <polygon points="0,-90 8,-35 -8,-35" fill="#FFD700" transform="rotate(270)"/>
    <polygon points="0,-90 8,-35 -8,-35" fill="#FFD700" transform="rotate(315)"/>
    <!-- Secondary smaller rays -->
    <polygon points="0,-70 5,-35 -5,-35" fill="#FFC125" transform="rotate(22.5)"/>
    <polygon points="0,-70 5,-35 -5,-35" fill="#FFC125" transform="rotate(67.5)"/>
    <polygon points="0,-70 5,-35 -5,-35" fill="#FFC125" transform="rotate(112.5)"/>
    <polygon points="0,-70 5,-35 -5,-35" fill="#FFC125" transform="rotate(157.5)"/>
    <polygon points="0,-70 5,-35 -5,-35" fill="#FFC125" transform="rotate(202.5)"/>
    <polygon points="0,-70 5,-35 -5,-35" fill="#FFC125" transform="rotate(247.5)"/>
    <polygon points="0,-70 5,-35 -5,-35" fill="#FFC125" transform="rotate(292.5)"/>
    <polygon points="0,-70 5,-35 -5,-35" fill="#FFC125" transform="rotate(337.5)"/>
  </g>
  <!-- Central sun circle -->
  <circle cx="100" cy="100" r="32" fill="url(#gd-glow)" stroke="#B8860B" stroke-width="2"/>
  <!-- Inner cross/star detail -->
  <path d="M100,75 L105,95 L120,100 L105,105 L100,125 L95,105 L80,100 L95,95 Z" fill="#FFF8DC" opacity="0.9"/>
</svg>